<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | LCIC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>

<body class="bg-gradient-to-b from-sky-100 to-white flex items-center justify-center min-h-screen text-gray-800">
  <div class="text-center px-6">
    <!-- Logo or Icon -->
    <div class="flex justify-center mb-6">
      <img src="assets/img/logo-blue.webp" alt="LCIC Logo" class="w-auto" />
    </div>

    <!-- Heading -->
    <h1 class="text-4xl md:text-6xl font-bold text-gray-900 mb-4">Coming Soon</h1>
    <p class="text-lg md:text-xl text-gray-600 max-w-2xl mx-auto">
      Our website is getting ready for launch!
      Stay tuned for exciting updates from <span class="font-semibold text-sky-700">LCIC</span>.
    </p>
    <!-- Subscribe Form -->
    <div class="mt-10 max-w-md mx-auto">
      <form class="flex flex-col sm:flex-row items-center gap-3">
        <input type="email" placeholder="Enter your email"
          class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" />
        <button type="submit"
          class="px-6 py-3 bg-sky-600 text-white font-semibold rounded-lg hover:bg-sky-700 transition w-full sm:w-auto">
          Notify Me
        </button>
      </form>
      <p class="text-sm text-gray-500 mt-3">We’ll notify you once the page goes live.</p>
    </div>
